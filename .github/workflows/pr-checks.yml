name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - 'next.config.*'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'playwright.config.*'
      - '.eslintrc*'
      - 'eslint.config.*'

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  checks:
    name: Lint · Type-check · Build · E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm run lint 2>&1 | tee lint-output.txt

      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee tsc-output.txt

      - name: Build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm run build 2>&1 | tee build-output.txt

      - name: Install Playwright browsers
        if: steps.build.outcome == 'success'
        run: pnpm exec playwright install chromium --with-deps

      - name: Start production server
        if: steps.build.outcome == 'success'
        run: pnpm start &

      - name: Wait for server on port 3000
        if: steps.build.outcome == 'success'
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 2s..."
            sleep 2
          done
          echo "Server did not start in time" && exit 1

      - name: Run Playwright E2E tests
        id: e2e
        if: steps.build.outcome == 'success'
        run: pnpm run e2e
        continue-on-error: true

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: playwright-results.json
          retention-days: 14

      - name: Post CI summary comment
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
        run: node scripts/post-ci-summary.mjs

      - name: Update PR checklist
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
        run: node scripts/update-pr-checklist.mjs

      - name: Create issues for failures
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BRANCH_NAME: ${{ github.head_ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: node scripts/create-failure-issues.mjs

      - name: Fail if any check failed
        if: |
          always() &&
          (steps.lint.outcome == 'failure' ||
           steps.typecheck.outcome == 'failure' ||
           steps.build.outcome == 'failure' ||
           steps.e2e.outcome == 'failure')
        run: exit 1
